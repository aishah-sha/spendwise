plugins {
    id "com.android.application"
    id "com.google.gms.google-services" // 🚨 PUT THIS BACK! It is mandatory for Push Notifications.
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.spendwise2003"
    compileSdk = 36
    ndkVersion = "28.2.13676358"
    
    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId = "com.example.spendwise2003"
        minSdk = 26
        targetSdk = 36
        versionCode = 1
        versionName = "1.0"
        multiDexEnabled true 
        manifestPlaceholders += [
            'appAuthRedirectScheme': 'io.supabase.flutter'
        ]
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    dependencies {
        implementation 'com.google.android.gms:play-services-auth:20.7.0'
        implementation 'androidx.multidex:multidex:2.0.1'
        implementation 'androidx.core:core:1.9.0'
        coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    }

    tasks.withType(JavaCompile) {
        options.compilerArgs += ['-Xlint:-options']
    }
}

/// ─── CRITICAL FIX BLOCK ───
// Forcing dynamic resolution rules without requiring hardcoded imports
configurations.all {
    resolutionStrategy {
        eachDependency { details ->
            if (details.requested.group == 'com.google.firebase' && details.requested.name == 'firebase-iid') {
                details.useVersion '21.1.0' // Force a compatible version of firebase-iid
            }
        }
    }
}

flutter {
    source = "../.."
}