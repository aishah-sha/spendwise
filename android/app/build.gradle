plugins {
    id "com.android.application"
    // REMOVED: id "com.google.gms.google-services" <--- This was causing the error
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.spendwise"
    compileSdk = 36
    ndkVersion = "28.2.13676358"
    
    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.example.spendwise"
        minSdk = 26
        targetSdk = 36
        versionCode = 1
        versionName = "1.0"
        multiDexEnabled true 
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }

    dependencies {
        // If you are using Supabase Auth with Google, you can keep this.
        // If you aren't using Google Sign-In at all, you can remove this too.
        implementation 'com.google.android.gms:play-services-auth:20.7.0'
        implementation 'androidx.multidex:multidex:2.0.1'
        implementation 'androidx.core:core:1.9.0'
    }

    tasks.withType(JavaCompile) {
        options.compilerArgs += ['-Xlint:-options']
    }
}

flutter {
    source = "../.."
}

